    <style id="ecospin-loader-css">
      #ecospin-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background-color: #F5EBFA;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      /* Initial state: scaled-down + invisible. GSAP pops it in once nav-logo
         dimensions are known (so the fly-target lands accurately). */
      #ecospin-loader-img {
        width: min(60vw, 320px);
        height: auto;
        opacity: 0;
        transform: scale(0.6);
        transform-origin: 50% 50%;
        will-change: transform, opacity;
        user-select: none;
        -webkit-user-drag: none;
      }
    </style>
  </head>
  <body>
    <div id="ecospin-loader">
      <img id="ecospin-loader-img" src="/ecospin-logo.png" alt="Ecospin Dry Cleaners" />
    </div>
    <script>
      // Safety net: if React fails to mount and run the loader animation,
      // wipe the overlay after 6s so the page isn't permanently blocked.
      setTimeout(function () {
        var l = document.getElementById('ecospin-loader');
        if (l) l.remove();
      }, 6000);
    </script>
